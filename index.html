<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-Frame Проєкт: Мещерякова</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial;
    }

    .title {
      position: fixed;
      top: 0;
      width: 100%;
      text-align: center;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      z-index: 10;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="title">A-Frame сцена — Мещерякова</div>

<a-scene background="color: #87ceeb" loading-screen="enabled: false">

  <!-- АССЕТЫ -->
  <a-assets>

    <!-- Текстура -->
    <img id="floor" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/uv-grid.png">

    <!-- ШРИФТ -->
    <a-asset-item id="font" src="fonts/good-pawoo-display-msdf.json"></a-asset-item>
    <img id="fontImg" src="fonts/good-pawoo-display.png">

    <!-- КОТ -->
    <a-asset-item id="catObj" src="models/cat/12221_Cat_v1_l3.obj"></a-asset-item>
    <a-asset-item id="catMtl" src="models/cat/12221_Cat_v1_l3.mtl"></a-asset-item>

  </a-assets>

  <!-- СВЕТ -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 3 2"></a-light>

  <!-- КАМЕРА -->
  <a-camera position="0 1.6 4"></a-camera>

  <!-- ПОЛ -->
  <a-plane
    src="#floor"
    rotation="-90 0 0"
    width="20"
    height="20"
    position="0 0 -5">
  </a-plane>

  <!-- СЦЕНА -->
  <a-entity position="0 0 -6">

    <!-- ПАНЕЛЬ -->
    <a-box
      position="0 2 0"
      width="5"
      height="2"
      depth="0.1"
      color="white">
    </a-box>

    <!-- ТЕКСТ (MSDF) -->
    <a-entity
      position="0 2.2 0.1"
      text="value: Мещерякова;
            font: fonts/good-pawoo-display-msdf.json;
            shader: msdf;
            align: center;
            width: 6;
            color: black;">
    </a-entity>

    <!-- РЕЗЕРВНЫЙ ТЕКСТ -->
    <a-text
      value="Мещерякова"
      align="center"
      width="6"
      color="black"
      position="0 1.5 0.1">
    </a-text>

    <!-- ДЕКОР -->
    <a-torus
      position="-2 2 1"
      radius="0.7"
      color="green"
      animation="property: rotation; to: 0 0 360; loop: true; dur: 8000">
    </a-torus>

    <a-torus-knot
      position="-3 2 -1"
      radius="0.5"
      color="orange"
      animation="property: rotation; to: 360 360 0; loop: true; dur: 9000">
    </a-torus-knot>

    <!-- ПЬЕДЕСТАЛ -->
    <a-cylinder
      position="2 0.3 1"
      radius="1"
      height="0.6"
      color="#cccccc">
    </a-cylinder>

    <!-- КОТ -->
    <a-entity
      obj-model="obj: #catObj; mtl: #catMtl"
      position="2 0.8 1"
      scale="0.03 0.03 0.03"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
    </a-entity>

    <!-- ЗАПАСНОЙ ОБЪЕКТ -->
    <a-sphere
      position="4 1 0"
      radius="0.5"
      color="purple"
      animation="property: position; to: 4 1.5 0; dir: alternate; loop: true">
    </a-sphere>

  </a-entity>

</a-scene>

</body>
</html>
