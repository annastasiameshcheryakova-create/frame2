<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-Frame Проєкт: Мещерякова</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    .page-title {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
      text-align: center;
      background: rgba(0, 0, 0, 0.45);
      color: #ffffff;
      padding: 12px 0;
      font-size: 16px;
      font-weight: 700;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="page-title">A-Frame Проєкт: Мещерякова — Сцена з котом і шрифтом</div>

  <a-scene
    background="color: #87ceeb"
    renderer="antialias: true; colorManagement: true"
    loading-screen="enabled: false">

    <a-assets timeout="12000">
      <!-- Текстура -->
      <img
        id="floorTexture"
        src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/uv-grid.png"
        crossorigin="anonymous"
      >

      <!-- ТВОЙ ГОТОВЫЙ MSDF-ШРИФТ -->
      <!-- Положи оба файла в папку fonts -->
      <a-asset-item id="surnameFont" src="fonts/good-pawoo-display-msdf.json"></a-asset-item>
      <img id="surnameFontImage" src="fonts/good-pawoo-display.png" crossorigin="anonymous">

      <!-- МОДЕЛЬ КОТА -->
      <!-- Эти файлы должны лежать рядом с index.html -->
      <a-asset-item id="catObj" src="12221_Cat_v1_l3.obj"></a-asset-item>
      <a-asset-item id="catMtl" src="12221_Cat_v1_l3.mtl"></a-asset-item>
    </a-assets>

    <!-- Небо -->
    <a-sky color="#87ceeb"></a-sky>

    <!-- Свет -->
    <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.1" position="1 4 2"></a-light>
    <a-light type="point" color="#fff2cc" intensity="0.8" position="2 3 -3"></a-light>

    <!-- Камера -->
    <a-entity position="0 1.6 4">
      <a-camera></a-camera>
    </a-entity>

    <!-- Пол с текстурой -->
    <a-plane
      src="#floorTexture"
      rotation="-90 0 0"
      width="18"
      height="18"
      position="0 0 -4"
      material="repeat: 6 6; roughness: 0.9; metalness: 0.1">
    </a-plane>

    <!-- Основная композиция -->
    <a-entity id="sceneGroup" position="0 0 -6">

      <!-- Панель -->
      <a-box
        position="0 2 0"
        width="6"
        height="2.2"
        depth="0.15"
        color="#f5f5f5">
      </a-box>

      <!-- Надпись через твой MSDF-шрифт -->
      <a-entity
        position="0 2.15 0.12"
        text="value: Мещерякова; font: fonts/good-pawoo-display-msdf.json; shader: msdf; color: #111111; align: center; anchor: center; baseline: center; width: 7;">
      </a-entity>

      <!-- Резервный текст, если шрифт не загрузится -->
      <a-text
        value="Мещерякова"
        color="#111111"
        align="center"
        width="8"
        position="0 1.4 0.13">
      </a-text>

      <a-text
        value="A-Frame сцена з текстурою, шрифтом і 3D-котом"
        color="#333333"
        align="center"
        width="7"
        position="0 1.05 0.13">
      </a-text>

      <!-- Декоративные фигуры -->
      <a-cylinder
        color="yellow"
        height="2"
        radius="0.07"
        position="-2 0.95 1">
      </a-cylinder>

      <a-cylinder
        color="blue"
        height="2"
        radius="0.07"
        position="-3 0.95 1">
      </a-cylinder>

      <a-torus
        position="-2 2.05 1"
        color="green"
        radius="0.8"
        radius-tubular="0.12"
        animation="property: rotation; to: 0 0 360; loop: true; dur: 9000; easing: linear"
        animation__color="property: components.material.material.color; type: color; from: green; to: #66ff66; dir: alternate; loop: true; dur: 3500">
      </a-torus>

      <a-torus-knot
        color="orange"
        radius="0.6"
        radius-tubular="0.14"
        p="2"
        q="3"
        position="-3.5 1.9 -0.2"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 10000; easing: linear">
      </a-torus-knot>

      <!-- Пьедестал -->
      <a-cylinder
        position="2.5 0.35 0.8"
        radius="1"
        height="0.7"
        color="#d9d9d9">
      </a-cylinder>

      <a-box
        position="2.5 0.75 0.8"
        width="1.7"
        height="0.08"
        depth="1.7"
        src="#floorTexture">
      </a-box>

      <!-- КОТ -->
      <a-entity
        obj-model="obj: #catObj; mtl: #catMtl"
        position="2.5 0.82 0.8"
        rotation="0 -25 0"
        scale="0.03 0.03 0.03"
        animation="property: rotation; to: 0 335 0; loop: true; dur: 12000; easing: linear">
      </a-entity>

      <!-- Резервная фигура -->
      <a-sphere
        position="4.5 1 -0.2"
        radius="0.6"
        color="#8a2be2"
        animation="property: position; to: 4.5 1.4 -0.2; dir: alternate; loop: true; dur: 2200; easing: easeInOutSine">
      </a-sphere>

      <a-box
        position="4 0.7 1.3"
        rotation="0 30 0"
        width="1"
        height="1"
        depth="1"
        src="#floorTexture"
        animation__float="property: position; to: 4 1 1.3; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine"
        animation__spin="property: rotation; to: 360 390 360; loop: true; dur: 14000; easing: linear">
      </a-box>

    </a-entity>
  </a-scene>

</body>
</html>
