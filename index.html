<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VR Scene - Mesheryakova Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene background="color: #1a1a1a" renderer="antialias: true; colorManagement: true;">
        
        <a-assets>
            <img id="floorTexture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/illustration/758px-Canestra_di_frutta_(Caravaggio).jpg" crossorigin="anonymous">
            
            <a-asset-item id="cat-obj" src="12221_Cat_v1_l3.obj"></a-asset-item>
            <a-asset-item id="cat-mtl" src="12221_Cat_v1_l3.mtl"></a-asset-item>
            
            <a-asset-item id="ukrFont" src="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/roboto/Roboto-Medium.json"></a-asset-item>
        </a-assets>

        <a-entity light="type: ambient; color: #BBB; intensity: 0.6"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 4 3"></a-entity>

        <a-entity id="mainContainer" position="0 0 -6">
            
            <a-plane src="#floorTexture" 
                     width="10" height="10" 
                     rotation="-90 0 0" 
                     position="0 -2 0" 
                     material="roughness: 0.8; metalness: 0.2">
            </a-plane>

            <a-box position="0 3 -4" width="8" height="1.5" depth="0.1" color="#2c3e50">
                <a-text value="Мещерякова" 
                        font="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/roboto/Roboto-Medium.json"
                        shader="msdf"
                        color="#ecf0f1" 
                        width="12" 
                        align="center" 
                        position="0 0 0.1"
                        animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dir: alternate; loop: true; dur: 2000">
                </a-text>
            </a-box>

            <a-entity obj-model="obj: #cat-obj; mtl: #cat-mtl"
                      position="2 -2 0"
                      scale="0.05 0.05 0.05"
                      rotation="-90 0 0"
                      animation="property: rotation; to: -90 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>

            <a-torus position="-3 1 0" 
                     color="#3498db" 
                     radius="1" 
                     radius-tubular="0.1"
                     animation="property: rotation; to: 360 360 0; loop: true; dur: 8000; easing: linear"
                     animation__color="property: material.color; from: #3498db; to: #e74c3c; dir: alternate; loop: true; dur: 4000">
            </a-torus>

            <a-torus-knot position="3 1 -2" 
                          radius="0.8" 
                          radius-tubular="0.15" 
                          color="#f1c40f"
                          animation="property: position; from: 3 1 -2; to: 3 1.5 -2; dir: alternate; loop: true; dur: 3000; easing: easeInOutQuad">
            </a-torus-knot>

            <a-text value="Welcome to AR/VR Learning" 
                    position="0 4.5 0" 
                    align="center" 
                    color="white" 
                    width="6">
            </a-text>

        </a-entity>

        <a-entity movement-controls="fly: false">
            <a-camera position="0 1.6 0" look-controls>
                <a-cursor color="#FF0000"></a-cursor>
            </a-camera>
        </a-entity>

    </a-scene>

</body>
</html>
